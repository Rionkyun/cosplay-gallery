<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosplay Gallery</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  text-align: center;

  background-image: url("bg/background_001.png");
  background-repeat: repeat-y;
  background-size: 100% auto;
}

/* ログイン */
#login {
  margin-top: 100px;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ff9de2;
  color: white;
  margin-left: 10px;
}

/* ロゴ */
#logo {
  display: none;         /* ←最初は非表示 */
  text-align: center;
  margin-top: 20px;
  margin-bottom: 20px;
}

#logo img {
  width: 300px;          /* ←サイズ調整 */
  max-width: 80%;
}

/* ギャラリー */
#gallery {
  display: none;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 50px 70px 70px 70px;
}

#gallery img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 10px;

  opacity: 0;
  animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
    }
}

/* モーダル */
#modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

#modal img {
  width: 70%;
  margin-top: 50px;
}
</style>

<script>
// 🔑 パスワード
function login() {
  const pass = "0824"; // ←ここ変更
  const input = document.getElementById("pass").value;

  if (input === pass) {
    document.getElementById("login").style.display = "none";
    document.getElementById("gallery").style.display = "grid";
    document.getElementById("logo").style.display = "block"; // ←追加
    loadImages();
  } else {
    alert("パスワードが違うよ!");
  }
}

// 📸 画像リスト
const images = [
  "images/cos_001.jpg",
  "images/cos_002.jpg",
  "images/cos_003.jpg",
  "images/cos_004.jpg",
  "images/cos_005.jpg"
];

// 🖼️ 表示
function loadImages() {
  const gallery = document.getElementById("gallery");

  images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;

    img.onclick = () => {
      document.getElementById("modal").style.display = "block";
      document.getElementById("modalImg").src = src;
    };

    gallery.appendChild(img);
  });
}

// ❌ モーダル閉じる
function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>
</head>

<body>

<!-- ログイン -->
<div id="login">
  <h2>👻 Password 👻</h2>
  <input type="password" id="pass">
  <button onclick="login()">入る</button>
</div>

<!-- ロゴ -->
<div id="logo">
  <img src="logo/logo_001.png">
</div>

<div id="gallery"></div>

<!-- ギャラリー -->
<div id="gallery"></div>

<!-- モーダル -->
<div id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

</body>
</html>
